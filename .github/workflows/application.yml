name: Full DevOps Pipeline

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform -chdir=terraform init

      - name: Terraform Apply
        run: terraform -chdir=terraform apply -auto-approve

      - name: Get Public IP
        run: |
          echo "PUBLIC_IP=$(terraform -chdir=terraform output -raw public_ip)" >> $GITHUB_ENV

      - name: Show IP
        run: |
          echo "Created EC2 IP = $PUBLIC_IP"

      - name: Wait For EC2
        run: sleep 60

      - name: Create SSH Key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 400 key.pem

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install ansible -y

      - name: Create Inventory
        run: |
          echo "[web]" > inventory.ini
          echo "$PUBLIC_IP" >> inventory.ini

      - name: Run Ansible
        run: |
          ANSIBLE_HOST_KEY_CHECKING=False \
          ansible-playbook \
          -u ec2-user \
          -i inventory.ini \
          --private-key key.pem \
          ansible/install-docker.yml

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/hazem-demo:v1 .

      - name: Push Image
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/hazem-demo:v1

      - name: Deploy Container
        run: |
          ssh \
          -o StrictHostKeyChecking=no \
          -i key.pem \
          ec2-user@$PUBLIC_IP << EOF

          docker pull ${{ secrets.DOCKER_USERNAME }}/hazem-demo:v1

          docker stop website || true
          docker rm website || true

          docker run -d \
            --name website \
            -p 80:80 \
            ${{ secrets.DOCKER_USERNAME }}/hazem-demo:v1

          EOF